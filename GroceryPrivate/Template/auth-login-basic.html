<!DOCTYPE html>
<html lang="en" class="light-style customizer-hide" dir="ltr" data-theme="theme-default" data-assets-path="../assets/"
  data-template="vertical-menu-template-free">

<head>
  <meta charset="utf-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0" />

  <title>Login Page</title>
{% load static %}
  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="{% static 'assets/img/G-mart logo2.jpeg' %}" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&display=swap"
    rel="stylesheet" />

  <!-- Icons -->
  <link rel="stylesheet" href="{% static 'assets/vendor/fonts/boxicons.css'%}" />

  <!-- Core CSS -->
  <link rel="stylesheet" href="{% static 'assets/vendor/css/core.css' %}" />
  <link rel="stylesheet" href="{% static 'assets/vendor/css/theme-default.css' %}" />
  <link rel="stylesheet" href="{% static 'assets/css/demo.css' %}" />

  <!-- Page CSS -->
  <link rel="stylesheet" href="{% static 'assets/vendor/css/pages/page-auth.css' %}" />

  <!-- Helpers -->
  <script src="{% static 'assets/vendor/js/helpers.js' %}"></script>

  <!-- Theme Config -->
  <script src="{% static 'assets/js/config.js' %}"></script>
</head>

<body>
  <div class="container-xxl">
    <div class="authentication-wrapper authentication-basic container-p-y">
      <div class="authentication-inner">
        <!-- Login Card -->
        <div class="card">
          <div class="card-body">

            <div class="app-brand justify-content-center">
              <a href="{% url 'Index' %}" class="app-brand-link gap-2">
                <img src="{% static 'assets/img/G-mart logo2.jpeg' %}" style="width:60px;height:50px;border-radius:50%;">
                <span style="font-size:25px;font-weight:bold;color:green;">G-Mart</span>
              </a>
            </div>

            <h4 class="mb-2">Welcome to G-Mart! 👋</h4>
            <p class="mb-4">Please sign-in to your account</p>

            <form id="formAuthentication" class="mb-3">

              <!-- Role -->
              <div class="mb-3">
                <label class="form-label">Role</label>
                <select id="role" class="form-control">
                  <option selected disabled>Select Role</option>
                  <option value="user">User</option>
                  <option value="admin">Admin</option>
                </select>
              </div>

              <!-- Email -->
              <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="text" class="form-control" id="email" placeholder="Enter your email" />
              </div>

              <!-- Password -->
              <div class="mb-3 form-password-toggle">
                <label class="form-label" for="password">Password</label>
                <input type="password" id="password" class="form-control" placeholder="•••••••••••" />
              </div>

              <!-- Submit Button -->
              <div class="mb-3">
                <button type="submit" class="btn btn-primary w-100" >Sign in</button>
              </div>

            </form>

            <p class="text-center">
              <span>New User?</span>
              <a href="{% url 'authregister' %}">Create an account</a>
              <br>
              <a href="{% url 'authforgot' %}" > Forget password?</a>
            </p>
          </div>
        </div>
        <!-- /Card -->
      </div>
    </div>
  </div>

  <!-- Core JS -->
  <script src="../assets/vendor/libs/jquery/jquery.js"></script>
  <script src="../assets/vendor/libs/popper/popper.js"></script>
  <script src="../assets/vendor/js/bootstrap.js"></script>
  <script src="../assets/vendor/libs/perfect-scrollbar/perfect-scrollbar.js"></script>
  <script src="{% static 'assets/vendor/js/menu.js' %}"></script>
  <script>
$("#formAuthentication").on("submit", function(e) {
    e.preventDefault();

    let data = {
        role: $("#role").val(),
        email: $("#email").val(),
        password: $("#password").val()
    };

    $.ajax({
        url: "auth_login.py",
        type: "POST",
        data: data,
        dataType: "json",
        success: function(res) {
            if (res.status === "success") {
                Swal.fire({
                    icon: "success",
                    title: "Login Successful!",
                    timer: 1500
                });

                setTimeout(function() {
                    window.location.href = res.redirect;
                }, 1500);

            } else {
                Swal.fire({
                    icon: "error",
                    title: "Login Failed",
                    text: res.message
                });
            }
        }
    });
});
</script>


  <!-- SweetAlert2 -->
  <!-- SweetAlert v1 CDN -->
  <script src="https://unpkg.com/sweetalert/dist/sweetalert.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <!-- Main JS -->
  <script src="{% static 'assets/js/main.js' %}"></script>
</body>

</html>
