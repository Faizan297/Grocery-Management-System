{% extends "adminbase.html" %}
{% block content %}
         <div class="content-wrapper">
            <!-- Content -->

            <div class="container-xxl flex-grow-1 container-p-y">
              <span style="font-size: 30px; font-weight: bold;">Purchase Item </span>
              <h5 class="fw-bold py-3 mb-4"><span class="text-muted fw-light">Home/Purchase Item/</span>Update</h5>
              <a href="purchase-item-entry.html"><button type="Entry" class="" style="width: 100px; height: 40px; position: relative; left: 1012px;top: -70px; background-color:#868686 ; border: 1px solid #868686; color: #fff; border-top-left-radius:10px ; border-bottom-left-radius:10px ;" >Entry</button></a>
              <a href="purchase-item-update.html"><button type="service" class="" style="width: 100px; height: 40px; position: relative; left: 1007px;top: -70px; background-color:  #17a2b8; border: 1px solid  #17a2b8; color: #fff;  border-top-right-radius:10px ; border-bottom-right-radius:10px ;" >Update</button></a>

              <!-- Basic Layout -->
              <div class="row" style="margin-top: -40px;">
                <div class="col-xl">
                  <div class="card mb-4">
                   <div class="card-header d-flex justify-content-between align-items-center"style=" background-color: rgb(18, 2, 89); height: 50px;" >
                      <h4 class="mb-0" style="color: white;">Service</h4>
                      <a href="category-entry.html"> <button style="border-radius: 10px; height: 35px; width: 110px; background-color: #00C2FF; color: #ffff; position: relative; left: 10px;font-size: 18px;">+ Add New</button> </a>
                      
                    </div>
                  
                    <div class="card-body" style="margin-top: 20px;">
                      <form>
                        <div class="row">
                        <div class="col-12 col-md-4 mb-3">
                          <label class="form-label" for="basic-icon-default-fullname">Purchase date</label>
                          <div class="input-group input-group-merge">
                            <span id="basic-icon-default-fullname2" class="input-group-text"
                              ><i class="menu-icon tf-icons bx bx-calendar"></i></span>
                            <input
                              type="date"
                              class="form-control"
                              id="date"
                              placeholder=" Order Item ID"
                              aria-label="John Doe"
                              aria-describedby="basic-icon-default-fullname2"
                            />
                          </div>
                        </div>
                          <div class="col-12 col-md-4 mb-3">
                          <label class="form-label" for="basic-icon-default-email"> purchase Item ID</label>
                          <div class="input-group input-group-merge">
                            <span class="input-group-text"> <i class="menu-icon tf-icons bx bx-cart"></i></span>
                            <input
                              type="text"
                              id="category"
                              class="form-control"
                              placeholder="Purchase ID"
                              aria-label="john.doe"
                              aria-describedby="basic-icon-default-email2"
                            />
                            <!-- <span id="basic-icon-default-email2" class="input-group-text">@example.com</span> -->
                          </div>
                          <span class="error-msg"></span>
                        </div>
                          <div class="col-12 col-md-4 mb-3">
                           <label class="form-label" for="basic-icon-default-phone">supplier ID</label>
                          <div class="input-group input-group-merge">
                            <span id="basic-icon-default-phone2" class="input-group-text"
                              ><i class="menu-icon tf-icons bx bx-store"></i></span>
                            <input
                              type="text"
                              id="uid"
                              class="form-control phone-mask"
                              placeholder="Supplier ID "
                              aria-label="658 799 8941"
                              aria-describedby="basic-icon-default-phone2"
                            />
                          </div>
                          <span class="error-msg"></span>
                        </div>
                      </div>
                      <form>
                        <div class="row">
                        <div class="col-12 col-md-4 mb-3">
                          <label class="form-label" for="basic-icon-default-email">category ID</label>
                          <div class="input-group input-group-merge">
                            <span class="input-group-text"><i class="bx bx-category"></i
                                ></span>
                            <input
                              type="text"
                              id="cid"
                              class="form-control"
                              placeholder="Category ID"
                              aria-label="john.doe"
                              aria-describedby="basic-icon-default-email2"
                            />
                          </div>
                          <span class="error-msg"></span>
                        </div> 
                            <div class="col-12 col-md-4 mb-3">
                          <label class="form-label" for="basic-icon-default-email">Product ID</label>
                          <div class="input-group input-group-merge">
                            <span class="input-group-text"><i class="bx bx-cube"></i
                                ></span>
                            <input
                              type="text"
                              id="prid"
                              class="form-control"
                              placeholder="Product ID"
                              aria-label="john.doe"
                              aria-describedby="basic-icon-default-email2"
                            />
                          </div>
                          <span class="error-msg"></span>
                        </div> 
                          <div class="col-12 col-md-4 mb-3">
                          <label class="form-label" for="basic-icon-default-email">quantity</label>
                          <div class="input-group input-group-merge">
                            <span class="input-group-text"><i class="bx bx-package"></i
                                ></span>
                            <input
                              type="text"
                              id="pin1"
                              class="form-control"
                              placeholder="Quantity"
                              aria-label="john.doe"
                              aria-describedby="basic-icon-default-email2"
                            />
                          </div>
                          <span class="error-msg"></span>
                        </div>
                    </div>
                      <div class="row">
                          <div class="col-12 col-md-4 mb-3">
                          <label class="form-label" for="basic-icon-default-email">purchase unit price</label>
                          <div class="input-group input-group-merge">
                            <span class="input-group-text"><i class="bx bx-money"></i
                                ></span>
                            <input
                              type="text"
                              id="tax"
                              class="form-control"
                              placeholder="Purchase Unit Price"
                              aria-label="john.doe"
                              aria-describedby="basic-icon-default-email2"
                            />
                          </div>
                          <span class="error-msg"></span>
                        </div>
                       
                        <div class="col-12 col-md-4 mb-3">
                          <label class="form-label" for="basic-icon-default-email"> unit price</label>
                          <div class="input-group input-group-merge">
                            <span class="input-group-text"><i class="bx bx-money"></i
                                ></span>
                            <input
                              type="text"
                              id="pin2"
                              class="form-control"
                              placeholder=" Unit Price"
                              aria-label="john.doe"
                              aria-describedby="basic-icon-default-email2"
                            />
                          </div>
                          <span class="error-msg"></span>
                        </div>
                            <div class="col-12 col-md-4 mb-3">
                          <label class="form-label" for="basic-icon-default-email">sell Price</label>
                          <div class="input-group input-group-merge">
                            <span class="input-group-text"><i class="bx bx-money"></i
                                ></span>
                            <input
                              type="text"
                              id="disc"
                              class="form-control"
                              placeholder="Sell Price"
                              aria-label="john.doe"
                              aria-describedby="basic-icon-default-email2"
                            />
                          </div>
                          <span class="error-msg"></span>
                        </div>
                        </div>
                         <div class="row">
                         <div class="col-12 col-md-4 mb-3">
                          <label class="form-label" for="basic-icon-default-email">gross amount</label>
                          <div class="input-group input-group-merge">
                            <span class="input-group-text"><i class="bx bx-money"></i
                                ></span>
                            <input
                              type="text"
                              id="pay"
                              class="form-control"
                              placeholder="Gross Amount"
                              aria-label="john.doe"
                              aria-describedby="basic-icon-default-email2"
                            />
                          </div>
                          <span class="error-msg"></span>
                        </div>
                    </div>
                          <button type="submit"  class="btn btn-success" id="s24" style="width: 150px; height: 40px; position: relative; left: 410px; background-color: green; margin-top: 15px;"><i class="bx bx-edit" style="position: relative; left: -5px; top: -2px;"></i><b>Update</b></button>
                          <button type="reset" class="btn btn-danger" style="width: 150px; height: 40px; position: relative; left: 460px; background-color: red;margin-top: 15px;"><i class="bx bx-refresh" style="position: relative; left: -5px; top: -2px; "></i><b>Reset</b></button>
                      </form>
                    </div>
                  </div>
                </div>
              </div>
            </div>
                          
                
            <!-- / Content -->

            <!-- Footer -->
            <footer class="content-footer footer bg-footer-theme">
              <div class="container-xxl d-flex flex-wrap justify-content-between py-2 flex-md-row flex-column">
                <div class="mb-2 mb-md-0">
                  ©
                  <script>
                    document.write(new Date().getFullYear());
                  </script>
                  , made with ❤️ by
                  <a href="https://themeselection.com" target="_blank" class="footer-link fw-bolder">Faizan</a>
                </div>



                  <!-- <a
                    href="https://github.com/themeselection/sneat-html-admin-template-free/issues"
                    target="_blank"
                    class="footer-link me-4"
                    >Support</a
                  > -->
                </div>
              </div>
            </footer>
            <!-- / Footer -->

            <div class="content-backdrop fade"></div>
          </div>
          <!-- Content wrapper -->
        </div>
        <!-- / Layout page -->
      </div>

      <!-- Overlay -->
      <div class="layout-overlay layout-menu-toggle"></div>
    </div>
    <!-- / Layout wrapper -->
   
    <script>
      $(document).ready(function () {
        const purchase_date = localStorage.getItem('purchase_date');
        const purchase_item_id = localStorage.getItem('purchase_item_id');
        const supplier_id = localStorage.getItem('supplier_id');
        const category_id = localStorage.getItem('category_id'); 
        const product_id = localStorage.getItem('product_id');
        const quantity = localStorage.getItem('quantity');
        const purchase_unit_price = localStorage.getItem('purchase_unit_price');
        const unit_price = localStorage.getItem('unit_price');
        const sell_price = localStorage.getItem('sell_price');
        const gross_amount = localStorage.getItem('gross_amount');
        $('#date').val(purchase_date);
        $('#category').val(purchase_item_id);
        $('#uid').val(supplier_id);
        $('#cid').val(category_id);
        $('#prid').val(product_id);
        $('#pin1').val(quantity);
        $('#tax').val(purchase_unit_price);
        $('#pin2').val(unit_price);
        $('#disc').val(sell_price);
        $('#pay').val(gross_amount);
      
      });
    </script>
                 <!-- SweetAlert v1 CDN -->
    <script src="https://unpkg.com/sweetalert/dist/sweetalert.min.js"></script>
     <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
{% endblock content %}
