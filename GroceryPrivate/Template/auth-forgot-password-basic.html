<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Forgot Password</title>
{% load static %} 
  <link rel="shortcut icon" href="{% static 'assets/img/G-mart logo2.jpeg' %}" type="image/x-icon">
   

  <link rel="stylesheet" href="{% static 'assets/vendor/css/core.css' %}" />
  <link rel="stylesheet" href="{% static 'assets/vendor/css/theme-default.css' %}" />
  <link rel="stylesheet" href="{% static 'assets/vendor/css/pages/page-auth.css' %}" />

  <style>
    .otp-input {
      width: 45px;
      height: 45px;
      font-size: 22px;
      text-align: center;
      margin: 4px;
      border: 1px solid #ccc;
      border-radius: 8px;
    }
    #otp-section, #reset-section {
      display: none;
    }
  </style>
</head>

<body>

<div class="container-xxl">
  <div class="authentication-wrapper authentication-basic container-p-y">
    <div class="authentication-inner py-4">

      <div class="card">
        <div class="card-body">

          <h4 class="mb-2 text-center">Forgot Password 🔒</h4>
          <p class="text-center mb-4">Enter email → verify OTP → reset password</p>

          <!-- EMAIL FORM -->
          <form id="emailForm">
            <div class="mb-3">
              <label class="form-label">Registered Email</label>
              <input type="email" id="email" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Send OTP</button>
          </form>

          <!-- OTP SECTION -->
          <div id="otp-section" class="mt-4">
            <label class="form-label">Enter OTP</label>

            <div style="text-align:center;">
              <input class="otp-input" maxlength="1">
              <input class="otp-input" maxlength="1">
              <input class="otp-input" maxlength="1">
              <input class="otp-input" maxlength="1">
              <input class="otp-input" maxlength="1">
              <input class="otp-input" maxlength="1">
            </div>

            <button id="verifyOtpBtn" class="btn btn-success w-100 mt-3">Verify OTP</button>
          </div>

          <!-- RESET PASSWORD SECTION -->
          <div id="reset-section" class="mt-4">

            <h5>Set New Password</h5>

            <div class="mb-3">
              <label>New Password</label>
              <input type="password" id="newpass" class="form-control" required>
            </div>

            <div class="mb-3">
              <label>Confirm Password</label>
              <input type="password" id="confirmpass" class="form-control" required>
            </div>

            <button id="resetPasswordBtn" class="btn btn-warning w-100">Reset Password</button>
          </div>

          <div class="text-center mt-3">
            <a href="{% url 'authlogin' %}">Back to login</a>
          </div>

        </div>
      </div>

    </div>
  </div>
</div>

<script src="{% static 'assets/vendor/libs/jquery/jquery.js' %}"></script>

<script>
$(document).ready(function () {

  // SEND OTP
  $("#emailForm").on("submit", function (e) {
    e.preventDefault();

    $.ajax({
      url: "send_otp.py",
      type: "POST",
      data: { email: $("#email").val() },
      dataType: "json",
      success: function (res) {
        if (res.status === "success") {
          alert("OTP sent to your email!");
          $("#otp-section").show();
        } else {
          alert(res.message);
        }
      }
    });
  });

  // OTP AUTO MOVE
  $(".otp-input").on("keyup", function () {
    if (this.value.length === 1) {
      $(this).next(".otp-input").focus();
    }
  });

  // VERIFY OTP
  $("#verifyOtpBtn").on("click", function () {

    let otp = "";
    $(".otp-input").each(function () { otp += $(this).val(); });

    $.ajax({
      url: "verify_otp.py",
      type: "POST",
      data: {
        email: $("#email").val(),
        otp: otp
      },
      dataType: "json",
      success: function (res) {
        if (res.status === "success") {
          alert("OTP Verified Successfully!");

          $("#otp-section").hide();
          $("#reset-section").show();

        } else {
          alert(res.message);
        }
      }
    });
  });

  // RESET PASSWORD
  $("#resetPasswordBtn").on("click", function () {

    let p1 = $("#newpass").val();
    let p2 = $("#confirmpass").val();

    if (p1 !== p2) {
      alert("Passwords do not match!");
      return;
    }

    $.ajax({
      url: "reset_password.py",
      type: "POST",
      data: {
        email: $("#email").val(),
        password: p1
      },
      dataType: "json",
      success: function (res) {
        if (res.status === "success") {
          alert("Password updated successfully!");
          window.location.href = "auth-login-basic.html";
        } else {
          alert(res.message);
        }
      }
    });

  });

});
</script>

</body>
</html>
