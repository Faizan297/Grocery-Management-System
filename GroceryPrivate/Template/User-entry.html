    <!-- SweetAlert v1 CDN -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
      $('#user-entry').submit(function (e) { 
          e.preventDefault();
          Swal.fire({
              icon:"question",
              title: "Do you want to Insert Data ?",
              showCancelButton: true,
              confirmButtonText: "Yes",
            }).then((result) => {
              if (result.isConfirmed) {
                var formData = new FormData();

                formData.append('csrfmiddlewaretoken', $('input[name="csrfmiddlewaretoken"]').val());
                formData.append('joining_date', $('#date').val());
                formData.append('user_id', $('#uid').val());
                formData.append('name', $('#sname').val());
                formData.append('father_name', $('#fname').val());
                formData.append('mother_name', $('#mname').val());
                formData.append('gender', $('input[name="gender"]:checked').val());
                formData.append('dob', $('#dob').val());
                formData.append('contact_number', $('#cont').val());
                formData.append('alternate_number', $('#cont2').val());
                formData.append('email', $('#email1').val());
                formData.append('aadhaar_number', $('#aadhaar').val());
                formData.append('qualification', $('#qualification').val());
                formData.append('position', $('#position1').val());
                formData.append('salary', $('#salary').val());
